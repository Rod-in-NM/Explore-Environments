# This YAML is for the production environment, and is based on the single-workflow.yml file.

name: Single Workflow Release (for production environment)

# Controls when the workflow will run
on:
  release:  
    types: [published]
  workflow_dispatch: # manual

jobs:
    production-deploy:
        if: github.event_name == 'release'
        runs-on: ubuntu-latest
        environment: production
        
        # Steps represent a sequence of tasks that will be executed as part of the job
        steps:
        # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        - uses: actions/checkout@v6

        # Putting in this step to see what event actions are involved. This is very helpful!
        # - name: Debug event
        #   run: echo "event=${{ github.event_name }} action=${{ github.event.action }}"
    
        # Runs a single command using the runners shell
        - name: Print value from ENVIRONMENT
          run: echo ${{ vars.DISPLAY_TEXT }}